name: CI/CD Pipeline

on:
  push:
    branches: [ stage, main ]
  pull_request:
    branches: [ stage, main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter Code Quality
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd flutter-app || cd Frontend
          flutter pub get
          flutter analyze

      - name: Python Code Quality
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd backend-python || cd Backend
          pip install -r requirements.txt ruff
          ruff check .

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            git pull origin ${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            echo "Deployed to ${{ github.ref_name }}"

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ job.status }}] Deployment - ${{ github.ref_name }}"
          to: ${{ secrets.DEVELOPER_EMAILS }}
          from: CI/CD Bot <${{ secrets.EMAIL_USERNAME }}>
          body: Pipeline finished with status: ${{ job.status }} on branch ${{ github.ref_name }}
          html_body: true