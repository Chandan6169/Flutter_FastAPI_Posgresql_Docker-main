name: CI/CD - Quality + Auto Deploy

on:
  push:
    branches: [ stage, main ]
  pull_request:
    branches: [ stage, main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter Code Quality
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd flutter-app
          flutter pub get
          flutter analyze
          flutter test --no-pub || echo "Flutter tests skipped"

      - name: Python Code Quality
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd backend-python
          pip install -r requirements.txt ruff pytest
          ruff check .
          pytest || echo "Some tests failed"

  deploy:
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            git pull origin ${{ github.ref_name }}
            
            # Auto rename if needed
            if [ -d "Frontend" ]; then mv Frontend flutter-app; fi
            if [ -d "Backend" ]; then mv Backend backend-python; fi
            
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo "✅ Deployment completed on ${{ github.ref_name }} at $(date)"

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ✅ SUCCESS - ${{ github.ref_name }} Deployment
          to: ${{ secrets.DEVELOPER_EMAILS }}
          from: CI/CD Bot <${{ secrets.EMAIL_USERNAME }}>
          body: Deployment successful on branch: ${{ github.ref_name }}<br>Server: 168.144.65.26
          html_body: true

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ❌ FAILED - ${{ github.ref_name }} Deployment
          to: ${{ secrets.DEVELOPER_EMAILS }}
          from: CI/CD Bot <${{ secrets.EMAIL_USERNAME }}>
          body: Deployment failed on ${{ github.ref_name }}. Please check GitHub Actions logs.
          html_body: true