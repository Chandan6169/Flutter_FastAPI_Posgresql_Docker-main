name: CI/CD Pipeline

on:
  push:
    branches: [ stage, main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter Check
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd flutter-app || cd Frontend
          flutter pub get
          flutter analyze

      - name: Python Check
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd backend-python || cd Backend
          pip install -r requirements.txt ruff
          ruff check .

      - name: Deploy
        if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            git pull
            docker compose -f docker-compose.prod.yml up -d --build

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ job.status }}] ${{ github.ref_name }} Deployment"
          to: ${{ secrets.DEVELOPER_EMAILS }}
          from: CI/CD Bot
          body: Status: ${{ job.status }} on ${{ github.ref_name }}
          html_body: true