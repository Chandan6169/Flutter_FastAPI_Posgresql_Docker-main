name: CI/CD - Quality + Deploy + Email

on:
  push:
    branches: [ stage, main ]
  pull_request:
    branches: [ stage, main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter Checks
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd flutter-app || cd Frontend
          flutter pub get
          flutter analyze
          flutter test --no-pub || echo "Flutter test skipped"

      - name: Python Checks
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd backend-python || cd Backend
          pip install -r requirements.txt ruff pytest
          ruff check .
          pytest || echo "Some tests failed"

  deploy-and-notify:
    needs: quality
    runs-on: ubuntu-latest
    if: always()     # Runs even if quality fails
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Server
        if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            git pull origin ${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: |
            [${{ job.status }}] ${{ github.repository }} - ${{ github.ref_name }}
          to: ${{ secrets.DEVELOPER_EMAILS }}
          from: CI/CD Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Pipeline Status: <strong>${{ job.status }}</strong><br><br>
            Repository: ${{ github.repository }}<br>
            Branch: ${{ github.ref_name }}<br>
            Commit: ${{ github.sha }}<br>
            Triggered by: ${{ github.actor }}<br><br>
            View Logs: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Click Here</a>
          html_body: true