name: CI/CD - Quality + Deploy + Email

on:
  push:
    branches: [ stage, main ]
  pull_request:
    branches: [ stage, main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Quality Check
        run: |
          if [ -d "flutter-app" ]; then
            cd flutter-app
          elif [ -d "Frontend" ]; then
            cd Frontend
          else
            echo "Flutter folder not found!"
            exit 1
          fi
          flutter pub get
          flutter analyze --no-fatal-infos || echo "Flutter analyze completed with warnings"

      # Python
      - name: Python Quality Check
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          if [ -d "backend-python" ]; then
            cd backend-python
          elif [ -d "Backend" ]; then
            cd Backend
          else
            echo "Backend folder not found!"
            exit 1
          fi
          pip install -r requirements.txt ruff
          ruff check . || echo "Ruff check completed"

  deploy-and-notify:
    needs: quality
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Server
        if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            git pull origin ${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            echo "✅ Deployed to ${{ github.ref_name }}"

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ job.status }}] ${{ github.repository }} - ${{ github.ref_name }}"
          to: ${{ secrets.DEVELOPER_EMAILS }}
          from: CI/CD Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Pipeline Status: <strong>${{ job.status }}</strong><br>
            Branch: ${{ github.ref_name }}<br>
            Commit: ${{ github.sha }}<br>
            View full logs: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">GitHub Actions</a>
          html_body: true